    <rect class="shape" x="1180" y="1260" width="180" height="95"/>
    <text x="1270" y="1308">订单</text>

    <rect class="shape" x="2090" y="790" width="180" height="95"/>
    <text x="2180" y="838">菜品</text>
  </g>

  <!-- 关系 -->
  <g id="relationships">
    <polygon class="shape" points="870,328 955,383 870,438 785,383"/>
