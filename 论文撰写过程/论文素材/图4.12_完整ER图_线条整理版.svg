    <text x="185" y="620">角色</text>
    <ellipse class="shape" cx="340" cy="760" rx="85" ry="38"/>
    <text x="340" y="760">余额</text>
    <ellipse class="shape" cx="675" cy="620" rx="85" ry="38"/>
