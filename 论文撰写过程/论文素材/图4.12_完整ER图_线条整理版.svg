<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1800" viewBox="0 0 2600 1800">
  <defs>
    <style>
      .shape {
        fill: #fff;
        stroke: #111;
        stroke-width: 3;
      }
      .line {
        fill: none;
        stroke: #111;
        stroke-width: 2.6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      text {
        fill: #111;
        font-family: "Microsoft YaHei", "SimSun", Arial, sans-serif;
        font-size: 30px;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .rel-text {
        font-size: 28px;
      }
      .cardinality {
        font-size: 28px;
      }
    </style>
  </defs>

  <rect width="2600" height="1800" fill="#fff"/>

  <!-- 属性连线 -->
  <g id="attribute-lines">
    <!-- 用户 -->
    <path class="line" d="M283 305 L380 354"/>
    <path class="line" d="M376 231 L420 335"/>
    <path class="line" d="M499 219 L490 335"/>
    <path class="line" d="M595 280 L560 347"/>
    <path class="line" d="M250 426 L380 380"/>
    <path class="line" d="M250 598 L395 430"/>
