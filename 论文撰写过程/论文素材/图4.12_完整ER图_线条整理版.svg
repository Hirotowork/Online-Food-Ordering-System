    <path class="line" d="M610 597 L545 430"/>
    <path class="line" d="M638 455 L560 390"/>

    <!-- 管理员 -->
    <path class="line" d="M277 1205 L380 1285"/>
    <path class="line" d="M350 1147 L420 1260"/>
    <path class="line" d="M507 1124 L495 1260"/>
    <path class="line" d="M632 1196 L560 1275"/>
    <path class="line" d="M260 1380 L380 1325"/>
    <path class="line" d="M600 1402 L560 1335"/>

    <!-- 餐桌 -->
    <path class="line" d="M1090 245 L1180 340"/>
    <path class="line" d="M1238 158 L1250 335"/>
    <path class="line" d="M1405 165 L1315 335"/>
    <path class="line" d="M1528 315 L1360 360"/>
    <path class="line" d="M1522 460 L1360 395"/>
    <path class="line" d="M1270 572 L1270 430"/>

    <!-- 订单 -->
    <path class="line" d="M1188 1117 L1225 1260"/>
    <path class="line" d="M1270 1184 L1270 1260"/>
    <path class="line" d="M1360 1118 L1325 1260"/>
    <path class="line" d="M1500 1223 L1360 1280"/>
    <path class="line" d="M1515 1385 L1360 1325"/>
    <path class="line" d="M1405 1510 L1335 1355"/>
    <path class="line" d="M1270 1602 L1270 1355"/>
    <path class="line" d="M1128 1510 L1205 1355"/>
    <path class="line" d="M1085 1390 L1180 1320"/>

    <!-- 菜品 -->
    <path class="line" d="M2035 674 L2090 805"/>
    <path class="line" d="M2195 613 L2190 790"/>
    <path class="line" d="M2334 696 L2270 805"/>
    <path class="line" d="M2075 1044 L2130 885"/>
    <path class="line" d="M2320 1038 L2245 885"/>
