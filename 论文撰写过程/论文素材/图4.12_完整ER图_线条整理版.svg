  <!-- 关系连线：使用分区走线，避免穿过节点和文字 -->
  <g id="relationship-lines">
    <!-- 用户-餐桌：占用 -->
    <path class="line" d="M560 383 L785 383"/>
    <path class="line" d="M955 383 L1180 383"/>

    <!-- 管理员-用户：维护用户 -->
    <path class="line" d="M470 430 L470 810"/>
    <path class="line" d="M470 890 L470 1260"/>

    <!-- 管理员-餐桌：维护餐桌 -->
    <path class="line" d="M560 1265 L735 1265 L735 760 L760 760"/>
    <path class="line" d="M940 760 L1075 760 L1180 430"/>

    <!-- 用户-订单：下单 -->
    <path class="line" d="M560 430 L655 530 L655 1125 L825 1125"/>
    <path class="line" d="M975 1125 L1180 1285"/>

    <!-- 管理员-订单：处理订单 -->
    <path class="line" d="M560 1308 L780 1308"/>
    <path class="line" d="M960 1308 L1180 1308"/>

    <!-- 管理员-菜品：维护菜品 -->
    <path class="line" d="M560 1340 L620 1700 L2180 1700 L2180 1265"/>
    <path class="line" d="M2180 1175 L2180 885"/>

    <!-- 订单-菜品：包含 -->
    <path class="line" d="M1360 1308 L1470 1308 L1470 1115 L1675 1115"/>
    <path class="line" d="M1805 1115 L1900 1115 L1900 845 L2090 845"/>
  </g>

  <!-- 关系基数 -->
  <g id="cardinality-labels">
    <text class="cardinality" x="690" y="352">0..1</text>
    <text class="cardinality" x="1050" y="352">0..1</text>

    <text class="cardinality" x="510" y="760">N</text>
    <text class="cardinality" x="510" y="945">1</text>

    <text class="cardinality" x="690" y="1245">1</text>
    <text class="cardinality" x="1088" y="720">N</text>

    <text class="cardinality" x="700" y="1098">1</text>
    <text class="cardinality" x="1115" y="1228">N</text>

    <text class="cardinality" x="700" y="1278">1</text>
    <text class="cardinality" x="1050" y="1278">N</text>

    <text class="cardinality" x="650" y="1635">1</text>
    <text class="cardinality" x="2220" y="1135">N</text>

    <text class="cardinality" x="1518" y="1148">N</text>
    <text class="cardinality" x="1942" y="920">N</text>
  </g>

  <!-- 实体 -->
  <g id="entities">
    <rect class="shape" x="380" y="335" width="180" height="95"/>
    <text x="470" y="383">用户</text>

    <rect class="shape" x="380" y="1260" width="180" height="95"/>
    <text x="470" y="1308">管理员</text>

    <rect class="shape" x="1180" y="335" width="180" height="95"/>
