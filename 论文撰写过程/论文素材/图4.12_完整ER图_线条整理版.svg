    <polygon class="shape" points="900,1078 975,1125 900,1172 825,1125"/>
    <text class="rel-text" x="900" y="1125">下单</text>

    <polygon class="shape" points="870,1263 960,1308 870,1353 780,1308"/>
    <text class="rel-text" x="870" y="1308">处理订单</text>

    <polygon class="shape" points="2180,1175 2270,1220 2180,1265 2090,1220"/>
    <text class="rel-text" x="2180" y="1220">维护菜品</text>

    <polygon class="shape" points="1740,1080 1805,1115 1740,1150 1675,1115"/>
    <text class="rel-text" x="1740" y="1115">包含</text>
  </g>

